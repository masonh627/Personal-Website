    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <script src="main.js" defer></script>
    </head>

    <body>
        <!--Navigation Bar-->
        <nav class="navbar">
            <h2 class="logo">Mason Hedger</h2>
            <ul class="navlinks">
                <li><a id="home" href="#home">Home</a></li>
                <li><a id="courses" href="#courses">Courses</a></li>
                <li><a id="projects" href="#projects">projects</a></li>
                <li><a id="contact" href="#contact">Contact</a></li>
            </ul>
        </nav>

        <!--Main Body of information-->
        <section class="home">
            <h1>Home</h1>
            <hr color="black">
            <ul class="homeinfo">
                <li id="aboutme"><h2>About Me</h2></li>
                <li id="hobbies"><h2>Hobbies</h2></li>
                <li id="interests"><h2>Interests</h2></li>
            </ul>
        </section>

        <section id="courses">
            <h1>Courses</h1>
            <hr color="black">
            <ul class="courseslist" id="courseslist">
            </ul>
        </section>

        <section id="projects">
            <h1>Projects</h1>
            <hr color="black">
            <ul class="projectlist" id="projectlist">

            </ul>
        </section>

        <section id="contact">
            <h1>Contact</h1>
            <hr color="black">
            <div id="contactinfo">
                
            </div>
            <form id="contactform">
                <label for="firstname">First Name: </label>
                <input type="text" id="firstname" class="textbox">
                <br>
                <label for="lastname">Last Name: </label>
                <input type="text" id="lastname" class="textbox">
                <br>
                <label for="email">Email: </label>
                <input type="email" id="email" class="textbox">
                <br>
                <label for="info">Additional Info:</label>
                <input type="text" id="info" class="textbox">
                <br>
                <input type="submit" id="submit" value="Submit Form">
            </form>
        </section>
    </body>
