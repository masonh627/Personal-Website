        <script src="main.js" defer></script>

    <body>
        <!--Navigation Bar-->
        <nav class="navbar">
            <h2 class="logo">Mason Hedger</h2>
            <ul class="navlinks">
                <li><a class="link" href="#home">Home</a></li>
                <li><a class="link" href="#courses">Courses</a></li>
                <li><a class="link" href="#projects">Projects</a></li>
                <li><a class="link" href="#contact">Contact</a></li>
            </ul>
        </nav>

        <!--Main Body of information-->
        <section class="home">
            <h1 class="heading" id="home">Home</h1>
            <hr class="divider">
           <ul class="homeinfo">
                <li id="aboutme"><h2>About Me</h2></li>
                <li id="hobbies"><h2>Hobbies</h2></li>
                <li id="interests"><h2>Interests</h2></li>
            </ul>
        </section>

        <section class="courses">
            <h1 class="heading" id="courses">Courses</h1>
            <hr>
            <ul class="courseslist" id="courseslist">
            </ul>
        </section>

        <section>
            <h1 class="heading" id="projects">Projects</h1>
            <hr>
            <ul class="projectlist" id="projectlist">

            </ul>
        </section>

        <section >
            <h1 class="heading" id="contact">Contact</h1>
            <hr>
            <address id="contactinfo">
                
            </address>
            <form id="contactform">
                <label for="firstname">First Name: </label>
                <input type="text" id="firstname" name="firstname" class="textbox" required>
                <br>
                <label for="lastname">Last Name: </label>
                <input type="text" id="lastname" name="lastname" class="textbox" required>
                <br>
                <label for="email">Email: </label>
                <input type="email" id="email" name="email" class="textbox" required>
                <br>
                <label for="info">Additional Info:</label>
                <input type="text" id="info" name="info" class="textbox">
                <br>
                <input type="submit" id="submit" value="Submit Form">
            </form>
        </section>
    </body>
